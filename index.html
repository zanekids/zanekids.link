        .bubble:nth-child(10) { width: 45px; height: 45px; left: 95%; animation-duration: 16s; animation-delay: -12s; background: rgba(99, 102, 241, 0.15); }
        .bubble:nth-child(11) { width: 55px; height: 55px; left: 15%; animation-duration: 21s; animation-delay: -1s; background: rgba(99, 102, 241, 0.08); }
        .bubble:nth-child(12) { width: 95px; height: 95px; left: 42%; animation-duration: 26s; animation-delay: -9s; background: rgba(78, 205, 196, 0.12); }
        .bubble:nth-child(13) { width: 65px; height: 65px; left: 62%; animation-duration: 23s; animation-delay: -14s; background: rgba(255, 107, 107, 0.1); }

        .bubble:nth-child(19) { width: 42px; height: 42px; left: 33%; animation-duration: 31s; animation-delay: -16s; background: rgba(78, 205, 196, 0.1); }
        .bubble:nth-child(20) { width: 88px; height: 88px; left: 78%; animation-duration: 20s; animation-delay: -2s; background: rgba(99, 102, 241, 0.1); }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .logo {
            display: block;
            width: 110px;
            height: 110px;
            background-image: url('zanelogo.jpg');

            background-position: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #6366f1;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo:hover {

        }
        h1 {

        }
        p {

        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            margin-bottom: 18px;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            color: #6366f1;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(99, 102, 241, 0.1);
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        .link-card:nth-of-type(1) { animation-delay: 0.1s; }
        .link-card:nth-of-type(2) { animation-delay: 0.2s; }
        .link-card:nth-of-type(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .link-card:hover {
            transform: translateY(-5px);
            background: #6366f1;
            color: #fff;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
        .link-card:hover i {
            color: #fff;
        }
        .link-card:active {
            transform: scale(0.98);
        }
        .link-card i {
            font-size: 24px;
            margin-left: 15px;
            color: #6366f1;
            transition: color 0.3s ease;
        }
